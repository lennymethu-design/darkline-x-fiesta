<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — DARKLINE X FIESTA</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;600&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --purple: #8B5CF6; --purple-dim: #4C1D95;
      --red: #CC1111; --red-bright: #E8211A; --red-dim: #8B0000;
      --black: #04040A; --black2: #080812; --white: #F0EEF5; --muted: #7a7888;
      --green: #00c896; --danger: #ff4757;
      --brand-gradient: linear-gradient(90deg, var(--red-bright), var(--purple));
      --nav-h: 64px;
    }
    body { background: var(--black); color: var(--white); font-family: 'Barlow', sans-serif; font-weight: 300; min-height: 100vh; }
    body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(204,17,17,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(109,40,217,0.02) 1px, transparent 1px); background-size: 80px 80px; pointer-events: none; z-index: 0; }
    body > * { position: relative; z-index: 1; }

    /* LOGIN */
    .login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
    .login-screen::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse 60% 60% at 50% 50%, rgba(139,8,0,0.08) 0%, transparent 60%), radial-gradient(ellipse 40% 40% at 80% 20%, rgba(109,40,217,0.08) 0%, transparent 60%); }
    .login-box { background: var(--black2); border: 1px solid rgba(139,92,246,0.2); padding: 3rem; width: 100%; max-width: 420px; position: relative; z-index: 1; }
    .login-box::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--brand-gradient); }
    .login-logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; letter-spacing: 0.12em; margin-bottom: 2rem; }
    .login-logo .brand-dark { color: var(--purple); }
    .login-logo .brand-fiesta { color: var(--red-bright); }
    .login-box h2 { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; letter-spacing: 0.04em; margin-bottom: 0.5rem; }
    .login-box p { color: var(--muted); font-size: 0.85rem; margin-bottom: 2rem; }
    .form-group { margin-bottom: 1.2rem; }
    .form-group label { display: block; font-family: 'Barlow Condensed', sans-serif; font-size: 0.68rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--purple); margin-bottom: 0.5rem; }
    .form-group input, .form-group select { width: 100%; background: var(--black); border: 1px solid rgba(139,92,246,0.2); color: var(--white); font-family: 'Barlow', sans-serif; font-size: 0.9rem; padding: 0.85rem 1rem; border-radius: 2px; outline: none; transition: border-color 0.25s; appearance: none; }
    .form-group input:focus, .form-group select:focus { border-color: var(--red-bright); }
    .form-group select option { background: var(--black2); }
    .btn-login { width: 100%; background: var(--brand-gradient); color: #fff; font-family: 'Barlow Condensed', sans-serif; font-size: 0.9rem; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; padding: 0.9rem; border: none; border-radius: 2px; cursor: pointer; transition: opacity 0.2s; }
    .btn-login:hover { opacity: 0.85; }
    .login-error { color: var(--danger); font-size: 0.82rem; margin-top: 0.8rem; display: none; }

    /* DASHBOARD */
    .dashboard { display: none; min-height: 100vh; }
    .dash-nav { background: rgba(4,4,10,0.95); border-bottom: 1px solid rgba(139,92,246,0.15); padding: 0 2rem; height: var(--nav-h); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(16px); }
    .dash-nav::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 1px; background: var(--brand-gradient); opacity: 0.4; }
    .dash-nav-logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; letter-spacing: 0.1em; }
    .dash-nav-logo .brand-dark { color: var(--purple); }
    .dash-nav-logo .brand-fiesta { color: var(--red-bright); }
    .dash-nav-right { display: flex; align-items: center; gap: 1.5rem; }
    .dash-role-badge { font-family: 'Barlow Condensed', sans-serif; font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; background: rgba(139,92,246,0.1); border: 1px solid rgba(139,92,246,0.3); color: var(--purple); padding: 0.3rem 0.8rem; border-radius: 2px; }
    .dash-user { font-size: 0.85rem; color: var(--muted); }
    .btn-logout { background: none; border: 1px solid rgba(255,255,255,0.08); color: var(--muted); font-family: 'Barlow Condensed', sans-serif; font-size: 0.75rem; letter-spacing: 0.2em; text-transform: uppercase; padding: 0.4rem 0.9rem; cursor: pointer; border-radius: 2px; transition: all 0.2s; }
    .btn-logout:hover { border-color: var(--danger); color: var(--danger); }
    .dash-body { padding: 2.5rem; }
    .dash-header { margin-bottom: 2.5rem; border-bottom: 1px solid rgba(139,92,246,0.1); padding-bottom: 1.5rem; }
    .dash-header h1 { font-family: 'Bebas Neue', sans-serif; font-size: 2.5rem; letter-spacing: 0.04em; background: var(--brand-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .dash-header p { color: var(--muted); font-size: 0.88rem; margin-top: 0.3rem; }

    .section-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; letter-spacing: 0.04em; margin-bottom: 1.5rem; margin-top: 2.5rem; display: flex; align-items: center; gap: 1rem; }
    .section-title::after { content: ''; flex: 1; height: 1px; background: var(--brand-gradient); opacity: 0.2; }

    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1px; background: rgba(139,92,246,0.06); border: 1px solid rgba(139,92,246,0.06); }
    .stat-card { background: var(--black2); padding: 1.8rem; position: relative; overflow: hidden; }
    .stat-card::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--brand-gradient); opacity: 0; transition: opacity 0.3s; }
    .stat-card:hover::after { opacity: 1; }
    .stat-card-label { font-family: 'Barlow Condensed', sans-serif; font-size: 0.68rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.5rem; }
    .stat-card-value { font-family: 'Bebas Neue', sans-serif; font-size: 2.5rem; line-height: 1; background: var(--brand-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .stat-card-sub { font-size: 0.75rem; color: var(--muted); margin-top: 0.3rem; }

    .tickets-table { width: 100%; border-collapse: collapse; }
    .tickets-table th { font-family: 'Barlow Condensed', sans-serif; font-size: 0.68rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--purple); text-align: left; padding: 0.8rem 1rem; border-bottom: 1px solid rgba(139,92,246,0.15); }
    .tickets-table td { padding: 1rem; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 0.88rem; }
    .tickets-table tr:hover td { background: rgba(139,92,246,0.03); }
    .badge { font-family: 'Barlow Condensed', sans-serif; font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; padding: 0.2rem 0.6rem; border-radius: 2px; }
    .badge-vip { background: rgba(139,92,246,0.15); color: var(--purple); border: 1px solid rgba(139,92,246,0.3); }
    .badge-reg { background: rgba(255,255,255,0.04); color: var(--muted); border: 1px solid rgba(255,255,255,0.08); }
    .badge-bundle { background: rgba(240,165,0,0.1); color: #f0a500; border: 1px solid rgba(240,165,0,0.3); }
    .progress-bar { width: 80px; height: 4px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--brand-gradient); border-radius: 2px; }
    .progress-fill.low { background: var(--danger); }

    .bookings-list { display: flex; flex-direction: column; gap: 1px; background: rgba(139,92,246,0.04); border: 1px solid rgba(139,92,246,0.04); }
    .booking-item { background: var(--black2); padding: 1.2rem 1.5rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; transition: background 0.2s; }
    .booking-item:hover { background: #0d0d1a; }
    .booking-name { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; letter-spacing: 0.05em; font-size: 0.95rem; }
    .booking-meta { color: var(--muted); font-size: 0.78rem; margin-top: 0.2rem; }
    .booking-amount { font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; color: var(--green); white-space: nowrap; }
    .empty-state { text-align: center; padding: 3rem; color: var(--muted); font-size: 0.88rem; background: var(--black2); border: 1px solid rgba(139,92,246,0.06); }

    .info-card { background: var(--black2); border: 1px solid rgba(139,92,246,0.08); padding: 2rem; margin-bottom: 1px; position: relative; overflow: hidden; }
    .info-card::before { content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 100%; background: var(--brand-gradient); }
    .info-card h3 { font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; letter-spacing: 0.04em; margin-bottom: 0.5rem; }
    .info-card p { color: var(--muted); font-size: 0.88rem; line-height: 1.7; }

    .btn-seed { background: none; border: 1px solid rgba(139,92,246,0.3); color: var(--purple); font-family: 'Barlow Condensed', sans-serif; font-size: 0.75rem; letter-spacing: 0.2em; text-transform: uppercase; padding: 0.4rem 1rem; cursor: pointer; border-radius: 2px; transition: all 0.2s; margin-left: 1rem; }
    .btn-seed:hover { background: rgba(139,92,246,0.1); }

    .schedule-list { border: 1px solid rgba(139,92,246,0.08); }
    .schedule-item { background: var(--black2); padding: 1.2rem 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.03); }
    .schedule-item:last-child { border-bottom: none; }
    .schedule-time { font-family: 'Barlow Condensed', sans-serif; font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 0.2rem; }
    .schedule-item.fiesta .schedule-time { color: var(--red-bright); }
    .schedule-item.darkline .schedule-time { color: var(--purple); }
    .schedule-item.neutral .schedule-time { color: var(--muted); }
    .schedule-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; letter-spacing: 0.04em; margin-bottom: 0.2rem; }
    .schedule-desc { font-size: 0.82rem; color: var(--muted); }

    @media (max-width: 768px) { .dash-body { padding: 1.5rem; } .dash-nav { padding: 0 1rem; } .dash-user { display: none; } }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div class="login-screen" id="loginScreen">
    <div class="login-box">
      <div class="login-logo"><span class="brand-dark">DARK</span>LINE × <span class="brand-fiesta">FIESTA</span></div>
      <h2>TEAM LOGIN</h2>
      <p>Authorised team members only.</p>
      <div class="form-group">
        <label>Your Name</label>
        <select id="loginRole">
          <option value="">— Select your name —</option>
          <option value="warren">Warren — C.E.O</option>
          <option value="saintvanta">Saint Vanta — Brand Manager</option>
          <option value="ian">Ian — Event Organizer</option>
          <option value="maina">Maina — Creative Director</option>
          <option value="ashton">Ashton — Financial Manager</option>
          <option value="clatt">Clatt — Merchandise Manager</option>
        </select>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="Enter your password">
      </div>
      <button class="btn-login" onclick="doLogin()">Access Dashboard</button>
      <div class="login-error" id="loginError">Incorrect password. Try again.</div>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div class="dashboard" id="dashboard">
    <nav class="dash-nav">
      <div class="dash-nav-logo"><span class="brand-dark">DARK</span>LINE × <span class="brand-fiesta">FIESTA</span></div>
      <div class="dash-nav-right">
        <span class="dash-user" id="dashUser"></span>
        <span class="dash-role-badge" id="dashRole"></span>
        <button class="btn-logout" onclick="doLogout()">Logout</button>
      </div>
    </nav>
    <div class="dash-body">
      <div class="dash-header">
        <h1 id="dashWelcome"></h1>
        <p id="dashSubtitle"></p>
      </div>
      <div id="dashContent"></div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, onValue, get, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const app = initializeApp({
      apiKey:"AIzaSyAC2ctWv8fu06DNYFzeT76pote-KUFbxfA",
      authDomain:"darkline-x-fiesta.firebaseapp.com",
      projectId:"darkline-x-fiesta",
      storageBucket:"darkline-x-fiesta.firebasestorage.app",
      messagingSenderId:"22306597234",
      appId:"1:22306597234:web:c11a440fff8b284d3795eb",
      databaseURL:"https://darkline-x-fiesta-default-rtdb.firebaseio.com"
    });
    const db = getDatabase(app);

    const CREDENTIALS = {
      warren:     { password:"warren2026",  role:"CEO",               name:"Warren",      access:"all" },
      saintvanta: { password:"vanta2026",   role:"Brand Manager",     name:"Saint Vanta", access:"brand" },
      ian:        { password:"ian2026",      role:"Event Organizer",   name:"Ian",         access:"events" },
      maina:      { password:"maina2026",   role:"Creative Director", name:"Maina",       access:"creative" },
      ashton:     { password:"ashton2026",  role:"Financial Manager", name:"Ashton",      access:"finance" },
      clatt:      { password:"clatt2026",   role:"Merch Manager",     name:"Clatt",       access:"merch" }
    };

    const TICKET_ORDER = ['fiesta_teams','fiesta_spectator','fiesta_substitute','darkline_regular','darkline_vip','darkline_5liners','fullpack_regular','fullpack_vip'];

    let currentUser = null;

    window.doLogin = function() {
      const key = document.getElementById('loginRole').value;
      const pass = document.getElementById('loginPassword').value;
      const err = document.getElementById('loginError');
      if (!key) { err.style.display='block'; err.textContent='Please select your name.'; return; }
      const cred = CREDENTIALS[key];
      if (!cred || pass !== cred.password) { err.style.display='block'; err.textContent='Incorrect password. Try again.'; return; }
      err.style.display='none';
      currentUser = { ...cred, key };
      showDashboard();
    };

    window.doLogout = function() {
      currentUser = null;
      document.getElementById('loginScreen').style.display='flex';
      document.getElementById('dashboard').style.display='none';
      document.getElementById('loginPassword').value='';
      document.getElementById('loginRole').value='';
    };

    function showDashboard() {
      document.getElementById('loginScreen').style.display='none';
      document.getElementById('dashboard').style.display='block';
      document.getElementById('dashUser').textContent = currentUser.name;
      document.getElementById('dashRole').textContent = currentUser.role;
      document.getElementById('dashWelcome').textContent = `WELCOME, ${currentUser.name.toUpperCase()}`;
      const subtitles = {
        all:      "Full access — you see everything across all departments.",
        brand:    "Brand overview — identity, event details, and ticket performance.",
        events:   "Event ops — live ticket availability and full schedule.",
        creative: "Creative — brand assets, design direction, and schedule.",
        finance:  "Finance — ticket sales, revenue breakdown, and bookings.",
        merch:    "Merchandise — inventory planning and event day sales."
      };
      document.getElementById('dashSubtitle').textContent = subtitles[currentUser.access];
      loadDashboard();
    }

    async function loadDashboard() {
      const access = currentUser.access;
      const content = document.getElementById('dashContent');

      const ticketsSnap = await get(ref(db,'tickets'));
      const ticketsRaw = ticketsSnap.val() || {};
      const tickets = TICKET_ORDER.map(id => ticketsRaw[id] ? {id,...ticketsRaw[id]} : null).filter(Boolean);

      const bookingsSnap = await get(ref(db,'bookings'));
      const bookingsRaw = bookingsSnap.val() || {};
      const bookings = Object.values(bookingsRaw).sort((a,b) => new Date(b.timestamp)-new Date(a.timestamp));

      const totalSold = tickets.reduce((s,t)=>s+(t.total-t.available),0);
      const totalRev  = tickets.reduce((s,t)=>s+((t.total-t.available)*t.price),0);
      const totalAvail= tickets.reduce((s,t)=>s+t.available,0);
      const totalCap  = tickets.reduce((s,t)=>s+t.total,0);

      let html = '';

      // ── CEO: everything ──
      if (access === 'all') {
        html += statsHTML([
          {label:'Tickets Sold',   value:totalSold,                  sub:`of ${totalCap} total`},
          {label:'Revenue (KSH)',  value:totalRev.toLocaleString(),  sub:'from ticket sales'},
          {label:'Tickets Left',   value:totalAvail,                 sub:'still available'},
          {label:'Bookings',       value:bookings.length,            sub:'total reservations'}
        ]);
        html += `<div class="section-title">Live Tickets <button class="btn-seed" onclick="seedTickets()">Reset Tickets</button></div>`;
        html += ticketsTableHTML(tickets, false);
        html += `<div class="section-title">All Bookings</div>` + bookingsHTML(bookings);
        html += brandHTML() + scheduleHTML() + merchHTML();
      }

      // ── FINANCE: revenue + bookings ──
      else if (access === 'finance') {
        html += statsHTML([
          {label:'Total Revenue (KSH)', value:totalRev.toLocaleString(),                                         sub:'from all ticket sales'},
          {label:'Tickets Sold',        value:totalSold,                                                          sub:`of ${totalCap} capacity`},
          {label:'Total Bookings',      value:bookings.length,                                                    sub:'reservations made'},
          {label:'Avg Ticket (KSH)',    value:totalSold>0?Math.round(totalRev/totalSold).toLocaleString():'0',   sub:'average per ticket'}
        ]);
        html += `<div class="section-title">Revenue by Ticket Type</div>` + ticketsTableHTML(tickets, true);
        html += `<div class="section-title">All Bookings</div>` + bookingsHTML(bookings);
      }

      // ── EVENTS: availability + schedule ──
      else if (access === 'events') {
        html += statsHTML([
          {label:'Tickets Available', value:totalAvail,   sub:`of ${totalCap} total`},
          {label:'Tickets Sold',      value:totalSold,    sub:'reservations made'},
          {label:'Event Date',        value:'15.08',      sub:'August 2026'},
          {label:'Venue',             value:'Arena One',  sub:'Valley Arcade, Nairobi'}
        ]);
        html += `<div class="section-title">Live Ticket Availability</div>` + ticketsTableHTML(tickets, false);
        html += `<div class="section-title">Event Schedule</div>` + scheduleHTML();
      }

      // ── BRAND: brand info + ticket overview ──
      else if (access === 'brand') {
        html += statsHTML([
          {label:'Event Date',    value:'15.08',   sub:'August 2026'},
          {label:'Venue',         value:'Arena One',sub:'Valley Arcade'},
          {label:'Expected',      value:'600+',    sub:'attendees'},
          {label:'Tickets Sold',  value:totalSold, sub:'so far'}
        ]);
        html += brandHTML();
        html += `<div class="section-title">Ticket Overview</div>` + ticketsTableHTML(tickets, false);
        html += `<div class="section-title">Bookings</div>` + bookingsHTML(bookings);
      }

      // ── CREATIVE: brand + schedule ──
      else if (access === 'creative') {
        html += statsHTML([
          {label:'Event Date', value:'15.08',     sub:'August 2026'},
          {label:'Venue',      value:'Arena One', sub:'Valley Arcade'},
          {label:'Brand',      value:'DL×F',      sub:'Darkline × Fiesta'},
          {label:'Status',     value:'LIVE',      sub:'Tickets on sale'}
        ]);
        html += brandHTML();
        html += `<div class="section-title">Event Schedule</div>` + scheduleHTML();
      }

      // ── MERCH: merch + schedule ──
      else if (access === 'merch') {
        html += statsHTML([
          {label:'Event Date',     value:'15.08', sub:'August 2026'},
          {label:'Merch Drops',    value:'1',     sub:'Event day drop'},
          {label:'Attendees Est.', value:'600+',  sub:'potential buyers'},
          {label:'Status',         value:'PLAN',  sub:'Pre-event phase'}
        ]);
        html += merchHTML();
        html += `<div class="section-title">Event Schedule</div>` + scheduleHTML();
      }

      content.innerHTML = html;

      // Live ticket updates
      onValue(ref(db,'tickets'), snap => {
        const raw = snap.val() || {};
        const updated = TICKET_ORDER.map(id => raw[id] ? {id,...raw[id]} : null).filter(Boolean);
        const tbody = document.getElementById('ticketsBody');
        if (tbody) tbody.innerHTML = ticketsRowsHTML(updated, access==='finance');
      });
    }

    function statsHTML(stats) {
      return `<div class="stats-grid">${stats.map(s=>`
        <div class="stat-card">
          <div class="stat-card-label">${s.label}</div>
          <div class="stat-card-value">${s.value}</div>
          <div class="stat-card-sub">${s.sub}</div>
        </div>`).join('')}</div>`;
    }

    function ticketsTableHTML(tickets, showRevenue) {
      return `<div style="overflow-x:auto"><table class="tickets-table">
        <thead><tr>
          <th>Ticket</th><th>Type</th><th>Price</th>
          ${showRevenue?'<th>Sold</th><th>Revenue (KSH)</th>':'<th>Available</th><th>Sold</th>'}
          <th>Fill</th>
        </tr></thead>
        <tbody id="ticketsBody">${ticketsRowsHTML(tickets, showRevenue)}</tbody>
      </table></div>`;
    }

    function ticketsRowsHTML(tickets, showRevenue) {
      return tickets.map(t => {
        if (!t || !t.name) return '';
        const sold = t.total - t.available;
        const pct  = Math.round((t.available / t.total) * 100);
        const isVip    = t.type === 'VIP';
        const isBundle = t.bundle;
        const low  = pct < 20;
        const badgeClass = isBundle ? 'badge-bundle' : isVip ? 'badge-vip' : 'badge-reg';
        return `<tr>
          <td><strong>${t.name}</strong></td>
          <td><span class="badge ${badgeClass}">${t.type}</span></td>
          <td>KSH ${t.price.toLocaleString()}</td>
          ${showRevenue
            ? `<td style="color:var(--green)">${sold}</td><td style="color:var(--green)">KSH ${(sold*t.price).toLocaleString()}</td>`
            : `<td>${t.available}/${t.total}</td><td style="color:var(--green)">${sold}</td>`}
          <td><div class="progress-bar"><div class="progress-fill ${low?'low':''}" style="width:${pct}%"></div></div></td>
        </tr>`;
      }).join('');
    }

    function bookingsHTML(bookings) {
      if (!bookings.length) return '<div class="empty-state">No bookings yet. They appear here in real time.</div>';
      return `<div class="bookings-list">${bookings.slice(0,30).map(b=>`
        <div class="booking-item">
          <div>
            <div class="booking-name">${b.customerName||'Anonymous'}</div>
